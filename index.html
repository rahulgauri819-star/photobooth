<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Camera Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:-apple-system,sans-serif; min-height:100vh; }
video {
  width:100vw;
  height:60vh;
  object-fit:cover;
  display:block;
  background:#111;
}
#log {
  padding:12px;
  font-size:13px;
  line-height:1.8;
  background:#111;
  min-height:40vh;
  overflow-y:auto;
}
.line { padding:4px 0; border-bottom:1px solid #222; }
.ok  { color:#4ade80; }
.err { color:#f87171; }
.inf { color:#60a5fa; }
button {
  display:block;
  width:calc(100% - 24px);
  margin:10px 12px;
  padding:16px;
  background:#c8f135;
  color:#000;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
}
</style>
</head>
<body>

<video id="v" autoplay playsinline muted webkit-playsinline></video>
<button onclick="startTest()">▶ Start Camera Test</button>
<div id="log"></div>

<script>
function log(msg, type='inf') {
  const d = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'line ' + type;
  line.textContent = new Date().toISOString().slice(11,23) + ' — ' + msg;
  d.appendChild(line);
  d.scrollTop = d.scrollHeight;
  console.log(msg);
}

log('Page loaded');
log('UserAgent: ' + navigator.userAgent.slice(0,80));
log('Protocol: ' + location.protocol);
log('mediaDevices exists: ' + !!navigator.mediaDevices);
log('getUserMedia exists: ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

async function startTest() {
  log('--- Starting camera test ---', 'inf');

  const vid = document.getElementById('v');
  log('Video element found: ' + !!vid);
  log('Video offsetWidth: ' + vid.offsetWidth);
  log('Video offsetHeight: ' + vid.offsetHeight);

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    log('❌ getUserMedia NOT supported on this browser', 'err');
    return;
  }

  log('Requesting camera with {video:true}...', 'inf');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    log('✅ Got stream! Tracks: ' + stream.getVideoTracks().length, 'ok');

    const track = stream.getVideoTracks()[0];
    log('Track label: ' + track.label, 'ok');
    log('Track readyState: ' + track.readyState, 'ok');

    vid.srcObject = stream;
    vid.muted = true;
    log('srcObject assigned', 'ok');

    vid.onloadedmetadata = () => {
      log('✅ loadedmetadata fired! ' + vid.videoWidth + 'x' + vid.videoHeight, 'ok');
    };
    vid.oncanplay = () => log('✅ canplay fired', 'ok');
    vid.onplaying = () => log('✅ playing fired — VIDEO SHOULD BE VISIBLE NOW', 'ok');
    vid.onerror   = (e) => log('❌ video error: ' + JSON.stringify(e), 'err');

    try {
      await vid.play();
      log('✅ play() resolved', 'ok');
    } catch(pe) {
      log('⚠️ play() threw: ' + pe.message, 'err');
    }

    setTimeout(() => {
      log('After 2s — readyState: ' + vid.readyState, 'inf');
      log('After 2s — paused: ' + vid.paused, 'inf');
      log('After 2s — videoWidth: ' + vid.videoWidth, 'inf');
      log('After 2s — currentTime: ' + vid.currentTime, 'inf');
      log('After 2s — srcObject: ' + (vid.srcObject ? 'set' : 'NULL'), 'inf');
    }, 2000);

  } catch(err) {
    log('❌ getUserMedia failed: ' + err.name + ' — ' + err.message, 'err');
  }
}
</script>
</body>
</html>
